name: Build and Push Docker Images

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  GHCR_IMAGE: ghcr.io/wentbackward/clone-tts-service
  DOCKERHUB_IMAGE: wentbackward/clone-tts-service

jobs:
  build-cuda:
    name: Build CUDA image (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            tag-suffix: cuda-amd64
          - platform: linux/arm64
            runner: ubuntu-latest
            tag-suffix: cuda-arm64
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GHCR_IMAGE }}
            ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=raw,value=${{ matrix.tag-suffix }}
            type=semver,pattern={{version}}-${{ matrix.tag-suffix }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=pytorch/pytorch:2.5.1-cuda12.4-cudnn9-runtime
          cache-from: type=gha,scope=${{ matrix.tag-suffix }}
          cache-to: type=gha,mode=max,scope=${{ matrix.tag-suffix }}

  build-cpu:
    name: Build CPU image (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - platform: linux/arm64
            runner: ubuntu-latest
            tag-suffix: cpu-arm64
          - platform: linux/amd64
            runner: ubuntu-latest
            tag-suffix: cpu-amd64
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GHCR_IMAGE }}
            ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=raw,value=${{ matrix.tag-suffix }}
            type=semver,pattern={{version}}-${{ matrix.tag-suffix }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=python:3.12-slim
          cache-from: type=gha,scope=${{ matrix.tag-suffix }}
          cache-to: type=gha,mode=max,scope=${{ matrix.tag-suffix }}

  manifest:
    name: Create multi-arch manifests
    needs: [build-cuda, build-cpu]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create GHCR cuda manifest
        run: |
          docker buildx imagetools create -t ${{ env.GHCR_IMAGE }}:cuda \
            ${{ env.GHCR_IMAGE }}:cuda-amd64 \
            ${{ env.GHCR_IMAGE }}:cuda-arm64

      - name: Create GHCR cpu manifest
        run: |
          docker buildx imagetools create -t ${{ env.GHCR_IMAGE }}:cpu \
            ${{ env.GHCR_IMAGE }}:cpu-amd64 \
            ${{ env.GHCR_IMAGE }}:cpu-arm64

      - name: Create GHCR latest manifest
        run: |
          docker buildx imagetools create -t ${{ env.GHCR_IMAGE }}:latest \
            ${{ env.GHCR_IMAGE }}:cuda-amd64 \
            ${{ env.GHCR_IMAGE }}:cuda-arm64

      - name: Create Docker Hub cuda manifest
        run: |
          docker buildx imagetools create -t ${{ env.DOCKERHUB_IMAGE }}:cuda \
            ${{ env.DOCKERHUB_IMAGE }}:cuda-amd64 \
            ${{ env.DOCKERHUB_IMAGE }}:cuda-arm64

      - name: Create Docker Hub cpu manifest
        run: |
          docker buildx imagetools create -t ${{ env.DOCKERHUB_IMAGE }}:cpu \
            ${{ env.DOCKERHUB_IMAGE }}:cpu-amd64 \
            ${{ env.DOCKERHUB_IMAGE }}:cpu-arm64

      - name: Create Docker Hub latest manifest
        run: |
          docker buildx imagetools create -t ${{ env.DOCKERHUB_IMAGE }}:latest \
            ${{ env.DOCKERHUB_IMAGE }}:cuda-amd64 \
            ${{ env.DOCKERHUB_IMAGE }}:cuda-arm64
